name: API Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false   # elevator-ui not needed for PHP API tests

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Copy env file
        run: |
          cp .env.example .env

      - name: Generate SSL certs
        run: |
          mkdir -p certs
          openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
            -keyout certs/nginx.key \
            -out    certs/nginx.crt \
            -subj   "/CN=localhost" \
            -addext "subjectAltName=IP:127.0.0.1,DNS:localhost" 2>/dev/null

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build PHP image (with layer cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          load: true
          tags: elevator-php-fpm:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            DOCKER_SCRATCH_DIR=/scratch
            DOCKER_ENVIRONMENT=testing

      - name: Start Docker stack
        run: docker compose up -d --no-build

      - name: Wait for app to be ready
        run: |
          timeout 120 bash -c 'until curl -sf http://localhost/defaultinstance > /dev/null; do sleep 2; done'

      - name: Initialize application
        run: |
          docker compose exec -T php-fpm composer install --no-interaction --no-progress
          docker compose exec -T php-fpm php doctrine.php orm:schema-tool:update --force
          docker compose exec -T postgres psql -U elevator -d elevator < docker/postgresQueries
          # Set the admin password to "admin" so tests can log in as admin:admin.
          # Hash is sha1(ENCRYPTION_KEY + password), matching the app's scheme.
          _enc_key=$(grep -E '^ENCRYPTION_KEY=' .env | cut -d= -f2)
          _hash=$(echo -n "${_enc_key}admin" | shasum -a 1 | cut -d' ' -f1)
          docker compose exec -T postgres psql -U elevator -d elevator \
            -c "UPDATE users SET password = '${_hash}' WHERE username = 'admin';"

      - name: Run API tests
        env:
          BASE_URL: https://localhost/defaultinstance
        run: npm run test:api

      - name: Dump server logs on failure
        if: always()
        run: |
          echo "==================== php-fpm logs ===================="
          docker compose logs --no-color --tail=400 php-fpm || true
          echo "==================== web (nginx) logs ===================="
          docker compose logs --no-color --tail=200 web || true
          echo "==================== CodeIgniter app logs ===================="
          docker compose exec -T php-fpm sh -c \
            'tail -n 400 /var/www/html/application/logs/*.php 2>/dev/null' || true
          echo "==================== sample 500 body ===================="
          # Reproduce a failing request and print the raw HTML error page,
          # which carries the real PHP fatal that the test discards.
          # With CI_ENV=local, display_errors is on, so the body has the trace.
          docker compose exec -T php-fpm sh -c '
            cookie=$(mktemp)
            echo "--- login ---"
            curl -sk -c "$cookie" -X POST \
              -d "username=admin&password=admin" \
              -w "login HTTP %{http_code}\n" \
              https://localhost/defaultinstance/loginManager/localLoginAsync \
              -o /tmp/login.out
            head -c 500 /tmp/login.out; echo
            echo "--- GET /templates/ (authed) ---"
            curl -sk -b "$cookie" -H "Accept: application/json" \
              -w "\ntemplates HTTP %{http_code}\n" \
              https://localhost/defaultinstance/templates/ \
              -o /tmp/tmpl.out
            cat /tmp/tmpl.out; echo
          ' || true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 30
