name: API Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false   # elevator-ui not needed for PHP API tests

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Copy env file
        run: |
          cp .env.example .env

      - name: Create REVISION file
        # Template.php reads ./REVISION on every render to cache-bust asset
        # URLs. If it's missing, app with throw 500 errors.
        run: echo "${{ github.sha }}" > REVISION

      - name: Generate SSL certs
        run: |
          mkdir -p certs
          openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
            -keyout certs/nginx.key \
            -out    certs/nginx.crt \
            -subj   "/CN=localhost" \
            -addext "subjectAltName=IP:127.0.0.1,DNS:localhost" 2>/dev/null

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build PHP image (with layer cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          load: true
          tags: elevator-php-fpm:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            DOCKER_SCRATCH_DIR=/scratch
            DOCKER_ENVIRONMENT=testing

      - name: Start Docker stack
        run: docker compose up -d --no-build

      - name: Wait for app to be ready
        run: |
          timeout 120 bash -c 'until curl -sf http://localhost/defaultinstance > /dev/null; do sleep 2; done'

      - name: Initialize application
        run: |
          docker compose exec -T php-fpm composer install --no-interaction --no-progress
          docker compose exec -T php-fpm php doctrine.php orm:schema-tool:update --force
          # The ./:/var/www/html bind mount shadows the image's writable Proxies
          # dir with the (empty, gitignored) host one, so the www-data worker
          # can't generate Doctrine proxies at request time. Make the runtime
          # dir writable so on-demand generation works.
          docker compose exec -T php-fpm sh -c \
            'mkdir -p application/models/Proxies && chmod 777 application/models/Proxies'
          docker compose exec -T postgres psql -U elevator -d elevator < docker/postgresQueries
          # Set the admin password to "admin" so tests can log in as admin:admin.
          # Hash is sha1(ENCRYPTION_KEY + password), matching the app's scheme.
          _enc_key=$(grep -E '^ENCRYPTION_KEY=' .env | cut -d= -f2)
          _hash=$(echo -n "${_enc_key}admin" | shasum -a 1 | cut -d' ' -f1)
          docker compose exec -T postgres psql -U elevator -d elevator \
            -c "UPDATE users SET password = '${_hash}' WHERE username = 'admin';"

      - name: Diagnose app state
        if: always()
        run: |
          mkdir -p ci-logs
          echo "######## proxy dir ownership / perms ########"
          docker compose exec -T php-fpm sh -c '
            echo "exec user: $(id)"
            echo "worker user: $(id www-data)"
            echo "--- application/models (parent) ---"
            ls -lan application/models/ | grep -iE "proxies|total"
            echo "--- application/models/Proxies ---"
            ls -lan application/models/Proxies/ 2>&1 | head
            echo "--- can www-data write to Proxies? ---"
            su -s /bin/sh www-data -c "touch application/models/Proxies/__probe 2>&1 && echo WRITABLE || echo NOT-WRITABLE"
            rm -f application/models/Proxies/__probe
          ' 2>&1 | tee ci-logs/proxy-perms.txt || true

          echo "######## HTTP probes (body saved to ci-logs/) ########"
          probe() { # name url [cookiefile]
            local name=$1 url=$2 ck=${3:-}
            if [ -n "$ck" ]; then
              curl -sk -m 20 -b "$ck" -H "Accept: application/json" "$url" \
                -o "ci-logs/probe-$name.html" -w "%{http_code}" > /tmp/code || true
            else
              curl -sk -m 20 "$url" \
                -o "ci-logs/probe-$name.html" -w "%{http_code}" > /tmp/code || true
            fi
            echo ">>> $name HTTP $(cat /tmp/code)"
            grep -iE "exception|severity|message:|must be writable|fatal|error was encountered|type:" \
              "ci-logs/probe-$name.html" | head -20 || true
          }

          probe homepage https://localhost/defaultinstance

          cookie=$(mktemp)
          curl -sk -m 20 -c "$cookie" -X POST -d "username=admin&password=admin" \
            https://localhost/defaultinstance/loginManager/localLoginAsync \
            -o ci-logs/probe-login.html -w "%{http_code}" > /tmp/code || true
          echo ">>> login HTTP $(cat /tmp/code)"

          probe templates https://localhost/defaultinstance/templates/ "$cookie"
          probe groups https://localhost/defaultinstance/adminPermissions/groups "$cookie"

      - name: Run API tests
        env:
          BASE_URL: https://localhost/defaultinstance
        run: npm run test:api

      - name: Collect container + app logs
        if: always()
        run: |
          mkdir -p ci-logs
          docker compose logs --no-color --no-log-prefix php-fpm > ci-logs/php-fpm.log 2>&1 || true
          docker compose logs --no-color --no-log-prefix web > ci-logs/nginx.log 2>&1 || true
          docker compose logs --no-color --no-log-prefix postgres > ci-logs/postgres.log 2>&1 || true
          docker compose exec -T php-fpm sh -c 'cat application/logs/*.php 2>/dev/null' \
            > ci-logs/codeigniter.log 2>&1 || true
          docker compose ps > ci-logs/compose-ps.txt 2>&1 || true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
            ci-logs/
          retention-days: 30
